name: 'dpib_hh'
version: '1.0.0'
config-version: 2

profile: 'dpib_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ----------------------------------------------------------------
# Materializations и базы данных под каждый слой
#
# Медальонная архитектура — три отдельные базы в ClickHouse:
#   dpib         — bronze (исходные данные из ingest-DAG)
#   dpib_silver  — staging + silver (нормализация и dedup)
#   dpib_gold    — gold (витрины под потребителей)
#
# Базы должны существовать заранее. Создаются:
#   - автоматически при первом старте ClickHouse через init-скрипт
#     init/clickhouse/03_create_databases.sql;
#   - вручную для уже работающего контейнера: `make clickhouse-bootstrap`.
# ----------------------------------------------------------------
models:
  dpib_hh:
    staging:
      +materialized: view
      +schema: silver        # staging живёт рядом с silver (это его подготовка)
    silver:
      +materialized: table
      +schema: silver
      +engine: 'MergeTree'
      +order_by: '(snapshot_id, vacancy_id)'
    gold:
      +materialized: table
      +schema: gold
      +engine: 'MergeTree'
