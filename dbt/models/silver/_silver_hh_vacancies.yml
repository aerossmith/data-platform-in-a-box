version: 2

models:
  - name: silver_hh_vacancies
    description: >
      Чистая таблица вакансий: dedup по (snapshot_id, vacancy_id) с выбором
      лучшей по качеству строки (detail_status='ok' > captcha > html > api).
      Дополнительно — массивы matched_roles / matched_areas.
      Grain: (snapshot_id, vacancy_id).
    columns:
      - name: snapshot_id
        data_tests:
          - not_null
      - name: vacancy_id
        data_tests:
          - not_null
      - name: title
        data_tests:
          - not_null
      - name: source_mode
        data_tests:
          - not_null

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - snapshot_id
            - vacancy_id
