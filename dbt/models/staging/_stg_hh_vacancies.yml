version: 2

models:
  - name: stg_hh_vacancies
    description: >
      Унифицированный staging-слой над bronze_hh_vacancies. Парсит raw_json
      в типизированные колонки независимо от source_mode (HTML fallback или API).
      Один к одному с bronze: grain (snapshot_id, search_text, search_area,
      vacancy_id, page_num). Дедупликации тут нет — это в silver.
    columns:
      - name: snapshot_id
        description: "UUID запуска DAG"
        data_tests:
          - not_null
      - name: vacancy_id
        description: "ID вакансии на HH. НЕ уникален в этой view."
        data_tests:
          - not_null
      - name: search_text
        description: "Текст запроса (роль)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['DevOps Engineer', 'Platform Engineer']
              where: &last_complete_snapshot >
                snapshot_id = (
                  SELECT snapshot_id
                  FROM dpib.bronze_hh_vacancies
                  GROUP BY snapshot_id
                  HAVING uniqExact(concat(search_text, '|', search_area)) = 6
                  ORDER BY max(ingested_at) DESC
                  LIMIT 1
                )
      - name: search_area
        description: "Региональный срез"
        data_tests:
          - not_null
          - accepted_values:
              values: ['msk', 'spb', 'remote']
              where: *last_complete_snapshot
      - name: source_mode
        description: "html_fallback или api (по умолчанию api если в payload пусто)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['html_fallback', 'api']
              where: *last_complete_snapshot
      - name: detail_status
        description: "ok, captcha, error, http_XXX, not_fetched_limit, disabled или NULL"
      - name: title
        description: "Название вакансии"
        data_tests:
          - not_null:
              where: *last_complete_snapshot
      - name: quality_score
        description: "4 — detail ok, 3 — captcha, 2 — html, 1 — api, 0 — unknown"
        data_tests:
          - not_null:
              where: *last_complete_snapshot
          - accepted_values:
              values: [0, 1, 2, 3, 4]
              where: *last_complete_snapshot
      - name: skills
        description: "Массив навыков из detail-страницы. Часто пустой."
      - name: has_detail
        description: "Флаг — пришёл ли полный detail-payload"
