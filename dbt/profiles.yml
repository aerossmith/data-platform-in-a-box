dpib_dbt:
  target: dev
  outputs:
    dev:
      type: clickhouse
      # DPIB_CLICKHOUSE_* уже выставлены в Airflow-контейнерах через docker-compose.
      # Локально (из WSL) используются дефолты или экспортируй переменные вручную.
      schema: "{{ env_var('DPIB_CLICKHOUSE_DB', 'dpib') }}"
      host: "{{ env_var('DPIB_CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('DPIB_CLICKHOUSE_PORT', '8123') | int }}"
      user: "{{ env_var('DPIB_CLICKHOUSE_USER', 'dpib') }}"
      password: "{{ env_var('DPIB_CLICKHOUSE_PASSWORD', 'dpib_pass') }}"
      driver: http
      secure: False
      verify: False
      connect_timeout: 10
      send_receive_timeout: 300
      # Последовательное выполнение: параллельные JSONExtract-тесты staging
      # упирались в лимит памяти ClickHouse.
      threads: 1
      use_lw_deletes: False
      check_exchange: False
