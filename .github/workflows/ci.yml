name: CI

# ============================================================
# Pipeline для data-platform-in-a-box
# Быстрые статические проверки без подъёма контейнеров.
# ============================================================

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  lint:
    name: Lint configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare .env
        run: cp .env.example .env

      # ---------- Docker Compose ----------
      - name: Validate docker-compose syntax
        run: docker compose config --quiet

      # ---------- YAML ----------
      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: YAML lint
        run: |
          yamllint -d '{
            extends: default,
            rules: {
              line-length: disable,
              document-start: disable,
              truthy: disable,
              comments-indentation: disable,
              indentation: {spaces: 2, indent-sequences: consistent}
            }
          }' config/ docker-compose.yml .github/

      # ---------- XML (конфиги ClickHouse) ----------
      - name: Install xmllint
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: XML lint (ClickHouse configs)
        run: |
          for f in config/clickhouse/*.xml; do
            echo "-> $f"
            xmllint --noout "$f"
          done

      # ---------- JSON (Grafana dashboards) ----------
      - name: JSON lint (Grafana dashboards)
        run: |
          for f in config/grafana/dashboards/*.json; do
            echo "-> $f"
            jq empty "$f"
          done

      # ---------- SQL (init scripts) ----------
      - name: Install sqlfluff
        run: pip install --quiet "sqlfluff==3.2.5"

      # SQL-линт пока в warn-режиме (|| true) — не валим CI на стиле
      - name: SQL lint (PostgreSQL init)
        run: |
          sqlfluff lint init/postgres/ \
            --dialect postgres \
            --rules LT01,LT02,LT12,CP01,CP02 \
            --disable-noqa || true

      - name: SQL lint (ClickHouse init)
        run: |
          sqlfluff lint init/clickhouse/ \
            --dialect clickhouse \
            --rules LT01,LT02,LT12,CP01,CP02 \
            --disable-noqa || true
