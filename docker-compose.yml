name: dpib

# ============================================================
# Data Platform in a Box
# Профили:
#   core          — PostgreSQL + ClickHouse + Redis
#   monitoring    — Prometheus + Grafana + Alertmanager + exporters
#   orchestration — Airflow 3.x с CeleryExecutor
# ============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:3.0.3-python3.12
  profiles: ["orchestration"]
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=}
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:-dpib-jwt-secret-change-me}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_pass@postgres:5432/airflow_meta
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow_pass@postgres:5432/airflow_meta
    AIRFLOW__CELERY__WORKER_CONCURRENCY: "2"
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    # ---- Метрики Airflow → StatsD → Prometheus ----
    AIRFLOW__METRICS__STATSD_ON: "true"
    AIRFLOW__METRICS__STATSD_HOST: statsd-exporter
    AIRFLOW__METRICS__STATSD_PORT: "9125"
    AIRFLOW__METRICS__STATSD_PREFIX: airflow
    # ---- ClickHouse (используется и DAG-ами и dbt через profiles.yml) ----
    DPIB_CLICKHOUSE_HOST: clickhouse
    DPIB_CLICKHOUSE_PORT: "8123"
    DPIB_CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dpib}
    DPIB_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dpib_pass}
    DPIB_CLICKHOUSE_DB: ${CLICKHOUSE_DB:-dpib}
    # ---- Пакеты при старте ----
    # beautifulsoup4 — HTML-парсинг вакансий (hh_vacancies_snapshot)
    # curl-cffi      — TLS-имперсонация Chrome для обхода ddos-guard
    # dbt-core + dbt-clickhouse — трансформации в dbt_hh_transform
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      clickhouse-connect==0.7.19
      requests==2.32.4
      curl-cffi==0.7.4
      beautifulsoup4==4.12.3
      dbt-core==1.8.9
      dbt-clickhouse==1.8.9
  volumes:
    - ./orchestration/dags:/opt/airflow/dags
    - ./orchestration/plugins:/opt/airflow/plugins
    - ./orchestration/logs:/opt/airflow/logs
    - ./dbt:/opt/airflow/dbt:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends
    postgres:
      condition: service_healthy
      required: false
    redis:
      condition: service_healthy
      required: false
  networks:
    - dpib_net


services:

  # ========== CORE ==========

  postgres:
    image: postgres:16-alpine
    container_name: dpib-postgres
    profiles: ["core"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpib}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpib_pass}
      POSTGRES_DB: ${POSTGRES_DB:-dpib}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    networks:
      - dpib_net

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: dpib-clickhouse
    profiles: ["core"]
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-dpib}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-dpib}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-dpib_pass}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
      - "${CLICKHOUSE_METRICS_PORT:-9363}:9363"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
      - ./config/clickhouse:/etc/clickhouse-server/config.d:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    mem_limit: 2g
    networks:
      - dpib_net

  redis:
    image: redis:7-alpine
    container_name: dpib-redis
    profiles: ["core"]
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    networks:
      - dpib_net


  # ========== MONITORING ==========

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dpib-prometheus
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=14d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    networks:
      - dpib_net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: dpib-alertmanager
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./config/alertmanager:/etc/alertmanager:ro
      - alertmanager_data:/alertmanager
    mem_limit: 128m
    networks:
      - dpib_net

  grafana:
    image: grafana/grafana:11.2.0
    container_name: dpib-grafana
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_INSTALL_PLUGINS: "grafana-clickhouse-datasource"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 512m
    networks:
      - dpib_net

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dpib-node-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    mem_limit: 64m
    networks:
      - dpib_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dpib-cadvisor
    profiles: ["monitoring"]
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 256m
    networks:
      - dpib_net

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dpib-postgres-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-dpib}:${POSTGRES_PASSWORD:-dpib_pass}@postgres:5432/${POSTGRES_DB:-dpib}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 64m
    networks:
      - dpib_net

  # StatsD exporter: принимает UDP-метрики от Airflow (порт 9125)
  # и отдаёт их Prometheus в формате /metrics (порт 9102).
  # Airflow шлёт сюда dag_duration, task_duration, operator_failures,
  # celery worker heartbeat и десятки других метрик.
  statsd-exporter:
    image: prom/statsd-exporter:v0.27.1
    container_name: dpib-statsd-exporter
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "9125:9125/udp"   # приём от Airflow
      - "9102:9102"       # Prometheus scrape
    mem_limit: 64m
    networks:
      - dpib_net


  # ========== ORCHESTRATION (Airflow 3.x + Celery) ==========

  airflow-init:
    <<: *airflow-common
    container_name: dpib-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        echo "===> airflow db migrate"
        airflow db migrate
        echo "===> init complete"
    restart: "no"
    mem_limit: 512m

  airflow-api-server:
    <<: *airflow-common
    container_name: dpib-airflow-api-server
    command: api-server
    ports:
      - "${AIRFLOW_UI_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 1g

  airflow-scheduler:
    <<: *airflow-common
    container_name: dpib-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 768m

  airflow-dag-processor:
    <<: *airflow-common
    container_name: dpib-airflow-dag-processor
    command: dag-processor
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 512m

  airflow-triggerer:
    <<: *airflow-common
    container_name: dpib-airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 512m

  airflow-worker:
    <<: *airflow-common
    container_name: dpib-airflow-worker
    command: celery worker
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
    mem_limit: 1g


networks:
  dpib_net:
    name: dpib_net
    driver: bridge

volumes:
  postgres_data:
    name: dpib_postgres_data
  clickhouse_data:
    name: dpib_clickhouse_data
  clickhouse_logs:
    name: dpib_clickhouse_logs
  redis_data:
    name: dpib_redis_data
  prometheus_data:
    name: dpib_prometheus_data
  grafana_data:
    name: dpib_grafana_data
  alertmanager_data:
    name: dpib_alertmanager_data
