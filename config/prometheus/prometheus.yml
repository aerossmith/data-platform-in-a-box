# ============================================================
# Prometheus — основной конфиг
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: dpib

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # ClickHouse — встроенный эндпоинт /metrics на порту 9363.
  # Отдаёт: query_duration, inserted_rows, parts, merges,
  # replication_queue, memory_usage, connections и др.
  - job_name: clickhouse
    static_configs:
      - targets: ["clickhouse:9363"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # Airflow через StatsD exporter.
  # Airflow шлёт UDP-метрики на statsd-exporter:9125,
  # exporter переводит их в Prometheus-формат на :9102.
  # Ключевые метрики:
  #   airflow_dag_processing_total_parse_time
  #   airflow_dagrun_duration_success_*
  #   airflow_operator_failures_*
  #   airflow_operator_successes_*
  #   airflow_celery_*
  - job_name: airflow
    static_configs:
      - targets: ["statsd-exporter:9102"]
