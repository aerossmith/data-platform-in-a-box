# ============================================================
# Grafana — автозагрузка дашбордов из папки
# Все JSON-файлы из /var/lib/grafana/dashboards подхватятся при старте
# ============================================================

apiVersion: 1

providers:
  - name: 'dpib'
    orgId: 1
    folder: 'DPIB'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
